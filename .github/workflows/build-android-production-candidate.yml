name: Build Android Production Candidate

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Production candidate tag, for example v0.2.0+2
        required: true
        type: string
      release_notes:
        description: Notes written into candidate latest.json
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-production-candidate:
    name: Build production candidate APK
    runs-on: ubuntu-latest
    env:
      APK_NAME: werewolf-agent-production-arm64.apk
      UPDATE_MANIFEST_URL: https://${{ github.repository_owner }}.github.io/Werewolf-agent/updates/stable.json
      UPDATE_MANIFEST_FALLBACK_URLS: ${{ vars.PRODUCTION_UPDATE_MANIFEST_FALLBACK_URLS }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse production version
        id: version
        shell: pwsh
        env:
          PRODUCTION_RELEASE_TAG: ${{ inputs.release_tag }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          . .github/scripts/android-update/common.ps1
          $version = Get-AndroidReleaseVersion `
            -ReleaseTag $env:PRODUCTION_RELEASE_TAG `
            -ReleaseNotes $env:RELEASE_NOTES `
            -DefaultReleaseNotes "Werewolf-agent Android production candidate."
          "tag=$($version.Tag)" >> $env:GITHUB_OUTPUT
          "version_name=$($version.VersionName)" >> $env:GITHUB_OUTPUT
          "version_code=$($version.VersionCode)" >> $env:GITHUB_OUTPUT
          "release_notes_path=$($version.ReleaseNotesPath)" >> $env:GITHUB_OUTPUT

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve dependencies
        working-directory: clients/flutter_app
        run: flutter pub get

      - name: Analyze
        working-directory: clients/flutter_app
        run: dart analyze

      - name: Test Flutter client
        working-directory: clients/flutter_app
        run: flutter test

      - name: Set up production signing
        shell: pwsh
        env:
          PRODUCTION_ANDROID_KEYSTORE_BASE64: ${{ secrets.PRODUCTION_ANDROID_KEYSTORE_BASE64 }}
          PRODUCTION_ANDROID_KEY_PROPERTIES: ${{ secrets.PRODUCTION_ANDROID_KEY_PROPERTIES }}
        run: |
          . .github/scripts/android-update/common.ps1
          Write-AndroidSigningFiles `
            -Channel production `
            -KeystoreBase64 $env:PRODUCTION_ANDROID_KEYSTORE_BASE64 `
            -KeyProperties $env:PRODUCTION_ANDROID_KEY_PROPERTIES

      - name: Build production arm64 release APK
        working-directory: clients/flutter_app
        shell: pwsh
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          $shortSha = $env:GIT_COMMIT.Substring(0, 7)
          $buildTime = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          flutter build apk --release --flavor production --target-platform android-arm64 `
            --android-project-arg requireProductionSigning=true `
            --build-name $env:VERSION_NAME `
            --build-number $env:VERSION_CODE `
            --dart-define "APP_VERSION=$($env:VERSION_NAME)+$($env:VERSION_CODE)" `
            --dart-define "UPDATE_MANIFEST_URL=$env:UPDATE_MANIFEST_URL" `
            --dart-define "UPDATE_MANIFEST_FALLBACK_URLS=$env:UPDATE_MANIFEST_FALLBACK_URLS" `
            --dart-define "UPDATE_CHANNEL=production" `
            --dart-define "UPDATE_APPLICATION_ID=io.werewolfagent.werewolf_app" `
            --dart-define "GIT_COMMIT=$shortSha" `
            --dart-define "BUILD_TIME=$buildTime"

      - name: Generate production candidate artifacts
        id: artifacts
        shell: pwsh
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          RELEASE_NOTES_PATH: ${{ steps.version.outputs.release_notes_path }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          . .github/scripts/android-update/common.ps1
          $artifacts = New-AndroidUpdateArtifacts `
            -Channel production `
            -ApplicationId "io.werewolfagent.werewolf_app" `
            -VersionName $env:VERSION_NAME `
            -VersionCode ([int]$env:VERSION_CODE) `
            -ReleaseTag $env:RELEASE_TAG `
            -GitCommit $env:GIT_COMMIT `
            -ApkPath "clients/flutter_app/build/app/outputs/flutter-apk/app-production-release.apk" `
            -ApkName $env:APK_NAME `
            -ReleaseNotesPath $env:RELEASE_NOTES_PATH `
            -OutputDirectory $env:RUNNER_TEMP
          "apk_path=$($artifacts.ApkPath)" >> $env:GITHUB_OUTPUT
          "manifest_path=$($artifacts.ManifestPath)" >> $env:GITHUB_OUTPUT
          "metadata_path=$($artifacts.MetadataPath)" >> $env:GITHUB_OUTPUT
          "sha256=$($artifacts.ApkSha256)" >> $env:GITHUB_OUTPUT
          "size_bytes=$($artifacts.ApkSizeBytes)" >> $env:GITHUB_OUTPUT

      - name: Upload production candidate release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          files: |
            ${{ steps.artifacts.outputs.apk_path }}
            ${{ steps.artifacts.outputs.manifest_path }}
            ${{ steps.artifacts.outputs.metadata_path }}

      - name: Publish summary
        shell: pwsh
        run: |
          @"
          ## Werewolf-agent Android production candidate

          - Channel: production
          - Version: ${{ steps.version.outputs.version_name }} (${{ steps.version.outputs.version_code }})
          - Release: ${{ steps.version.outputs.tag }}
          - Manifest asset: latest.json
          - Metadata asset: build-metadata.json
          - APK size: ${{ steps.artifacts.outputs.size_bytes }} bytes
          - SHA256: ${{ steps.artifacts.outputs.sha256 }}
          "@ >> $env:GITHUB_STEP_SUMMARY
