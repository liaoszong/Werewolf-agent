name: tests

# R-38: the docs treat "all tests pass" as an acceptance gate but nothing enforced it
# (no CI). This runs the full stdlib unittest suite on every push/PR on a clean Linux
# runner — where localhost loopback works, so the observer-server HTTP tests (leak /
# traversal / secret-scan) actually execute and are verified, not just locally (R-11).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unittest suite
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -p "test_*.py"
      # T-1: report-only coverage (no threshold, never blocks). Reruns the same
      # stdlib-unittest suite under coverage; config lives in pyproject [tool.coverage].
      # Read coverage numbers from CI only — locally the loopback-blocked observer
      # HTTP tests skew them (docs/health-check/03-architecture-optimization.md §T-1).
      - name: Coverage report (non-blocking)
        continue-on-error: true
        env:
          PYTHONPATH: src
        run: |
          pip install -r requirements-dev.txt
          coverage run -m unittest discover -s tests -p "test_*.py"
          coverage report

  windows-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Windows focused gate
        env:
          PYTHONPATH: src
        run: python -m unittest tests.windows_gate

  flutter-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Resolve Flutter dependencies
        working-directory: clients/flutter_app
        run: flutter pub get
      - name: Analyze Flutter client
        working-directory: clients/flutter_app
        run: dart analyze
      - name: Test Flutter client
        working-directory: clients/flutter_app
        run: flutter test
