services:
  werewolf-observer:
    build:
      context: ..
      dockerfile: Dockerfile
    image: werewolf-observer:local
    container_name: werewolf-observer
    restart: unless-stopped
    environment:
      WEREWOLF_OBSERVER_OWNER_TOKEN: ${WEREWOLF_OBSERVER_OWNER_TOKEN:-}
    ports:
      - "8765:8765"
    volumes:
      - werewolf_runs:/data/runs

volumes:
  werewolf_runs:
